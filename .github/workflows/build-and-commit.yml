name: Build and commit PDFs

on:
  repository_dispatch:
    types: ["latex_updated"]

permissions:
  contents: write

concurrency:
  group: build-pdfs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PDFs repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up SSH for private latex submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LATEX_SUBMODULE_SSH_KEY }}

      - name: Update latex submodule to latest main
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule update --remote --recursive

      - name: Install TeX + latexmk + biber
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            biber \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra \
            texlive-science

      - name: Build PDFs into repo root
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Commit updated PDFs and submodule pointer (if changed)
        env:
          LATEX_SHA: ${{ github.event.client_payload.latex_sha }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.pdf latex
          git commit -m "Auto-build PDFs from latex ${LATEX_SHA} [skip ci]"
          git push
