name: Build PDFs

on:
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: build-pdfs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LATEX_SUBMODULE_SSH_KEY }}

      - name: Checkout submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install TeX + latexmk + biber
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            biber \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra \
            texlive-science

      - name: Build PDFs into repo root
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Commit updated PDFs (if changed)
        run: |
          if git diff --quiet; then
            echo "No PDF changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.pdf
          git commit -m "Auto-build PDFs [skip ci]"
          git push
